version: '3.8'

services:
  db:
    image: postgres:15
    container_name: wis_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: wis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: wis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: wisadmin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 001122334455
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: